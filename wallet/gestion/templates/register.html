{% extends 'base.html' %}

{% block title %}Registro{% endblock %}


{% block content %}
<div class="row justify-content-center align-items-center h-100">
    <div class="col-11 col-md-4 mt-5">
        <div class="card text-center p-4">
            <h1>Registro de Usuario</h1>
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                    
                    <div class="mb-3">
                        {{ field }}
                    </div>
                    {% if field.errors %}
                        <div class="text-danger small">
                            {{ field.errors }}
                        </div>
                    {% endif %}
                {% endfor %}
                <button class="btn-pr" type="submit"> Registrar</button>
            </form>
        </div>
    </div>
</div>
{%endblock %}
