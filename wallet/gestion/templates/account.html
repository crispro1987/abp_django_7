{% extends 'base.html' %}

{% block title %}
{% if object %}
        Editar Cuenta
    {% else %}
        Crear Cuenta
    {% endif %}
{% endblock %}

{% block content %}
<h2>
    {% if object %}
        Editar Cuenta
    {% else %}

    {{ form.as_p }}

</form>

<a href="{% url 'account_list' %}">Volver</a>

{% endblock %}
